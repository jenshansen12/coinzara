<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Withdraw | Coinzara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0E1A; color: #EAECEF; }
        .navbar { background: #0B0E1A; border-bottom: 1px solid #2B3139; padding: 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #F0B90B, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .nav-links a { color: #EAECEF; text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; }
        .container { max-width: 550px; margin: 0 auto; padding: 80px 20px 40px; }
        .page-title { margin-bottom: 24px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 600; }
        .page-title p { color: #848E9C; font-size: 0.85rem; margin-top: 8px; }
        .balance-card { background: #1E232C; border-radius: 16px; padding: 20px; margin-bottom: 24px; border: 1px solid #2B3139; text-align: center; }
        .balance-label { font-size: 0.7rem; color: #848E9C; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 2rem; font-weight: 700; color: #F0B90B; }
        .withdraw-form { background: #1E232C; border-radius: 16px; padding: 24px; border: 1px solid #2B3139; }
        label { font-size: 0.8rem; color: #848E9C; margin-bottom: 6px; display: block; }
        select, input { width: 100%; padding: 12px 16px; background: #2B3139; border: 1px solid #434F5A; border-radius: 8px; color: #EAECEF; font-size: 0.9rem; margin-bottom: 20px; }
        button { width: 100%; background: #F0B90B; color: #0B0E1A; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .withdraw-btn { background: #F6465D; color: white; }
        .info-box { background: #131722; padding: 16px; border-radius: 8px; margin: 20px 0; font-size: 0.75rem; color: #848E9C; border-left: 3px solid #F0B90B; }
        .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.85rem; }
        .success { background: #0ECB8122; border: 1px solid #0ECB81; color: #0ECB81; }
        .error { background: #F6465D22; border: 1px solid #F6465D; color: #F6465D; }
        .back-btn { background: #2B3139; color: #EAECEF; margin-top: 16px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">COINZARA</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="settings.html">Settings</a>
                <a href="support.html">Support</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-title">
            <h1>Withdraw Funds</h1>
            <p>Request a withdrawal to your external wallet</p>
        </div>
        <div class="balance-card">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount">$<span id="balance">0.00</span></div>
        </div>
        <div class="withdraw-form">
            <label>Select Network</label>
            <select id="withdrawNetwork">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="ETH">Ethereum (ETH)</option>
                <option value="BNB">BNB (BEP-20)</option>
                <option value="SOL">Solana (SOL)</option>
                <option value="TRON">Tron (TRC-20)</option>
            </select>
            <label>Destination Wallet Address</label>
            <input type="text" id="withdrawAddress" placeholder="Enter your wallet address" required>
            <label>Amount (USD)</label>
            <input type="number" id="withdrawAmount" placeholder="Enter amount" required>
            <button class="withdraw-btn" onclick="requestWithdrawal()">Submit Withdrawal Request</button>
            <div class="info-box">Processing Time: 24-48 hours | All withdrawals are securely processed</div>
            <div id="withdrawMsg"></div>
        </div>
        <button class="back-btn" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>

    <script>
        async function loadUserData() { const res = await fetch('/api/me'); const data = await res.json(); if (data.loggedIn) { document.getElementById('balance').innerText = data.balance.toFixed(2); } else { window.location.href = 'login.html'; } }
        async function requestWithdrawal() { const amount = document.getElementById('withdrawAmount').value; const network = document.getElementById('withdrawNetwork').value; const walletAddress = document.getElementById('withdrawAddress').value; if (!amount || !walletAddress) { alert('Please fill all fields'); return; } const res = await fetch('/api/request-withdrawal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: parseFloat(amount), network, walletAddress }) }); const data = await res.json(); const msgDiv = document.getElementById('withdrawMsg'); if (data.success) { msgDiv.innerHTML = `<div class="message success">${data.message}</div>`; document.getElementById('withdrawAmount').value = ''; document.getElementById('withdrawAddress').value = ''; loadUserData(); } else { msgDiv.innerHTML = `<div class="message error">${data.error}</div>`; } }
        document.getElementById('logoutBtn').addEventListener('click', async () => { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'login.html'; });
        loadUserData();
    </script>
</body>
</html>
