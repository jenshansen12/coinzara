<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | Coinzara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0E1A; color: #EAECEF; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #F0B90B; margin-bottom: 24px; }
        .login-box, .admin-box { background: #1E232C; padding: 24px; border-radius: 16px; margin-bottom: 24px; border: 1px solid #2B3139; }
        input { width: 100%; padding: 12px; background: #2B3139; border: 1px solid #434F5A; border-radius: 8px; color: #EAECEF; margin-bottom: 16px; }
        button { background: #F0B90B; color: #0B0E1A; padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.75rem; }
        th, td { padding: 10px 6px; text-align: left; border-bottom: 1px solid #2B3139; }
        th { background: #F0B90B; color: #0B0E1A; }
        .success { color: #0ECB81; margin-top: 10px; }
        .error { color: #F6465D; margin-top: 10px; }
        h3 { margin-bottom: 16px; color: #F0B90B; }
        .footer { text-align: center; margin-top: 40px; color: #848E9C; font-size: 0.7rem; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
        .badge-referral { background: #0ECB8122; color: #0ECB81; }
        @media (max-width: 768px) { th, td { padding: 6px 4px; font-size: 0.65rem; } .container { overflow-x: auto; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <div id="adminLogin" class="login-box"><h3>Administrator Access</h3><input type="email" id="adminEmail" placeholder="Admin Email"><input type="password" id="adminPassword" placeholder="Admin Password"><button onclick="adminLogin()">Login</button><div id="loginMsg"></div></div>
        <div id="adminPanel" style="display:none;">
            <div class="admin-box"><h3>Manual Balance Adjustment</h3><input type="email" id="userEmail" placeholder="User Email"><input type="number" id="newBalance" placeholder="New Balance (USD)"><input type="text" id="reason" placeholder="Reason (Deposit / AI Profit)"><button onclick="updateBalance()">Update Balance</button><div id="balanceMsg"></div></div>
            <div class="admin-box"><h3>Add Referral Bonus</h3><input type="email" id="referralUserEmail" placeholder="User Email"><input type="number" id="bonusAmount" placeholder="Bonus Amount (USD)"><button onclick="addReferralBonus()">Add Referral Bonus</button><div id="bonusMsg"></div></div>
            <div class="admin-box"><h3>All Users</h3><button onclick="loadUsers()">Refresh</button><div id="usersList"></div></div>
        </div>
        <div class="footer">&copy; 2026 Coinzara.org | Admin Panel</div>
    </div>
    <script>
        async function adminLogin() { const email = document.getElementById('adminEmail').value; const password = document.getElementById('adminPassword').value; if (email === 'admin@coinzara.org' && password === 'admin123') { document.getElementById('adminLogin').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; loadUsers(); } else { document.getElementById('loginMsg').innerHTML = '<div class="error">Invalid credentials</div>'; } }
        async function updateBalance() { const userEmail = document.getElementById('userEmail').value; const newBalance = document.getElementById('newBalance').value; const reason = document.getElementById('reason').value; const adminEmail = document.getElementById('adminEmail').value; const adminPassword = document.getElementById('adminPassword').value; const res = await fetch('/api/admin/update-balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminEmail, adminPassword, userEmail, newBalance: parseFloat(newBalance), reason }) }); const data = await res.json(); if (data.success) { document.getElementById('balanceMsg').innerHTML = `<div class="success">Balance updated to $${data.newBalance}</div>`; loadUsers(); } else { document.getElementById('balanceMsg').innerHTML = `<div class="error">${data.error}</div>`; } }
        async function addReferralBonus() { const userEmail = document.getElementById('referralUserEmail').value; const bonusAmount = document.getElementById('bonusAmount').value; const adminEmail = document.getElementById('adminEmail').value; const adminPassword = document.getElementById('adminPassword').value; const res = await fetch('/api/admin/add-referral-bonus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminEmail, adminPassword, userEmail, bonusAmount: parseFloat(bonusAmount) }) }); const data = await res.json(); if (data.success) { document.getElementById('bonusMsg').innerHTML = `<div class="success">Bonus added! New balance: $${data.newBalance}</div>`; loadUsers(); } else { document.getElementById('bonusMsg').innerHTML = `<div class="error">${data.error}</div>`; } }
        async function loadUsers() { const adminEmail = document.getElementById('adminEmail').value; const adminPassword = document.getElementById('adminPassword').value; const res = await fetch(`/api/admin/users?email=${adminEmail}&password=${adminPassword}`); const data = await res.json(); if (data.success && data.users) { let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Country</th><th>Balance</th><th>Ref Code</th><th>Ref Count</th><th>Ref Bonus</th><th>AI Profit</th><th>Joined</th></tr></thead><tbody>'; data.users.forEach(u => { html += `<tr><td>${escapeHtml(u.fullName)}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.country || '-')}</td><td>$${u.balance.toFixed(2)}</td><td><span class="badge badge-referral">${escapeHtml(u.referralCode || '-')}</span></td><td>${u.referralCount || 0}</td><td>$${(u.referralBonus || 0).toFixed(2)}</td><td>$${(u.aiProfit || 0).toFixed(2)}</td><td>${new Date(u.createdAt).toLocaleDateString()}</td></tr>`; }); html += '</tbody></table>'; document.getElementById('usersList').innerHTML = html; } else { document.getElementById('usersList').innerHTML = '<div class="error">Failed to load</div>'; } }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    </script>
</body>
</html>
