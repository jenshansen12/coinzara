<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | Coinzara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0E1A; color: #EAECEF; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #F0B90B; margin-bottom: 24px; }
        .login-box, .admin-box { background: #1E232C; padding: 24px; border-radius: 16px; margin-bottom: 24px; border: 1px solid #2B3139; }
        input { width: 100%; padding: 12px; background: #2B3139; border: 1px solid #434F5A; border-radius: 8px; color: #EAECEF; margin-bottom: 16px; }
        button { background: #F0B90B; color: #0B0E1A; padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.75rem; overflow-x: auto; display: block; }
        th, td { padding: 10px 6px; text-align: left; border-bottom: 1px solid #2B3139; }
        th { background: #F0B90B; color: #0B0E1A; }
        .success { color: #0ECB81; margin-top: 10px; }
        .error { color: #F6465D; margin-top: 10px; }
        h3 { margin-bottom: 16px; color: #F0B90B; }
        .footer { text-align: center; margin-top: 40px; color: #848E9C; font-size: 0.7rem; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
        .badge-referral { background: #0ECB8122; color: #0ECB81; }
        .section-title { margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; color: #F0B90B; }
        @media (max-width: 768px) { th, td { padding: 6px 4px; font-size: 0.65rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <div id="adminLogin" class="login-box"><h3>Administrator Access</h3><input type="email" id="adminEmail" placeholder="Admin Email" value="admin@coinzara.org"><input type="password" id="adminPassword" placeholder="Admin Password"><button onclick="adminLogin()">Login</button><div id="loginMsg"></div></div>
        
        <div id="adminPanel" style="display:none;">
            <div class="admin-box"><h3>Manual Balance Adjustment</h3><input type="email" id="userEmail" placeholder="User Email"><input type="number" id="newBalance" placeholder="New Balance (USD)"><input type="text" id="reason" placeholder="Reason (Deposit / Withdrawal)"><button onclick="updateBalance()">Update Balance</button><div id="balanceMsg"></div></div>
            
            <div class="admin-box"><h3>Update AI Profit</h3><input type="email" id="aiUserEmail" placeholder="User Email"><input type="number" id="aiProfitAmount" placeholder="AI Profit Amount (USD)"><button onclick="updateAiProfit()">Update AI Profit</button><div id="aiProfitMsg"></div></div>
            
            <div class="admin-box"><h3>Delete User Account</h3><input type="email" id="deleteUserEmail" placeholder="User Email"><button onclick="deleteUser()" style="background:#F6465D; color:white;">Delete User Permanently</button><div id="deleteMsg"></div></div>
            
            <div class="admin-box"><h3>Platform Stats (Proof of Reserves)</h3>
                <input type="number" id="totalUserBalances" placeholder="Total User Balances (USD)">
                <input type="number" id="totalBTCHeld" placeholder="Total BTC Held">
                <input type="number" id="totalETHHeld" placeholder="Total ETH Held">
                <input type="number" id="totalBNBHeld" placeholder="Total BNB Held">
                <input type="number" id="totalSOLHeld" placeholder="Total SOL Held">
                <input type="number" id="totalTRONHeld" placeholder="Total TRON Held">
                <input type="number" id="aiTradingVolume" placeholder="AI Trading Volume">
                <input type="number" id="totalTrades" placeholder="Total Trades Count">
                <input type="number" id="monthlyReturn" placeholder="Monthly Return %">
                <button onclick="updatePlatformStats()">Update Platform Stats</button>
                <div id="statsMsg"></div>
            </div>
            
            <div class="admin-box"><h3>Historical Reserves (Monthly)</h3>
                <div id="historicalReservesContainer"></div>
                <button onclick="addHistoricalMonth()">Add Month</button>
                <button onclick="updateHistoricalReserves()">Save Historical Reserves</button>
                <div id="historicalMsg"></div>
            </div>
            
            <div class="admin-box"><h3>All Users</h3><button onclick="loadUsers()">Refresh Users</button><div id="usersList"></div></div>
        </div>
        <div class="footer">&copy; 2026 Coinzara.org | Admin Panel</div>
    </div>
    
    <script>
        let historicalMonths = [];
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (email === 'admin@coinzara.org' && password === '419123') {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadUsers();
                loadPlatformStats();
                loadHistoricalReserves();
            } else {
                document.getElementById('loginMsg').innerHTML = '<div class="error">Invalid credentials</div>';
            }
        }
        
        async function updateBalance() {
            const userEmail = document.getElementById('userEmail').value;
            const newBalance = document.getElementById('newBalance').value;
            const reason = document.getElementById('reason').value;
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch('/api/admin/update-balance', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail, adminPassword, userEmail, newBalance: parseFloat(newBalance), reason })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('balanceMsg').innerHTML = `<div class="success">Balance updated to $${data.newBalance}</div>`;
                loadUsers();
            } else {
                document.getElementById('balanceMsg').innerHTML = `<div class="error">${data.error}</div>`;
            }
        }
        
        async function updateAiProfit() {
            const userEmail = document.getElementById('aiUserEmail').value;
            const aiProfit = document.getElementById('aiProfitAmount').value;
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch('/api/admin/update-ai-profit', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail, adminPassword, userEmail, aiProfit: parseFloat(aiProfit) })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('aiProfitMsg').innerHTML = `<div class="success">AI Profit updated to $${data.newAiProfit}. New balance: $${data.newBalance}</div>`;
                loadUsers();
            } else {
                document.getElementById('aiProfitMsg').innerHTML = `<div class="error">${data.error}</div>`;
            }
        }
        
        async function deleteUser() {
            const userEmail = document.getElementById('deleteUserEmail').value;
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            if (!confirm(`Are you sure you want to delete user ${userEmail}? This cannot be undone.`)) return;
            const res = await fetch('/api/admin/delete-user', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail, adminPassword, userEmail })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('deleteMsg').innerHTML = `<div class="success">${data.message}</div>`;
                loadUsers();
            } else {
                document.getElementById('deleteMsg').innerHTML = `<div class="error">${data.error}</div>`;
            }
        }
        
        async function updatePlatformStats() {
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const stats = {
                totalUserBalances: parseFloat(document.getElementById('totalUserBalances').value) || 0,
                totalBTCHeld: parseFloat(document.getElementById('totalBTCHeld').value) || 0,
                totalETHHeld: parseFloat(document.getElementById('totalETHHeld').value) || 0,
                totalBNBHeld: parseFloat(document.getElementById('totalBNBHeld').value) || 0,
                totalSOLHeld: parseFloat(document.getElementById('totalSOLHeld').value) || 0,
                totalTRONHeld: parseFloat(document.getElementById('totalTRONHeld').value) || 0,
                aiTradingVolume: parseFloat(document.getElementById('aiTradingVolume').value) || 0,
                totalTrades: parseInt(document.getElementById('totalTrades').value) || 0,
                monthlyReturn: parseFloat(document.getElementById('monthlyReturn').value) || 0
            };
            const res = await fetch('/api/admin/update-stats', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail, adminPassword, ...stats })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('statsMsg').innerHTML = '<div class="success">Platform stats updated successfully</div>';
            } else {
                document.getElementById('statsMsg').innerHTML = `<div class="error">${data.error}</div>`;
            }
        }
        
        async function loadPlatformStats() {
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch(`/api/admin/stats?email=${adminEmail}&password=${adminPassword}`);
            const data = await res.json();
            if (data.success && data.stats) {
                document.getElementById('totalUserBalances').value = data.stats.totalUserBalances || 0;
                document.getElementById('totalBTCHeld').value = data.stats.totalBTCHeld || 0;
                document.getElementById('totalETHHeld').value = data.stats.totalETHHeld || 0;
                document.getElementById('totalBNBHeld').value = data.stats.totalBNBHeld || 0;
                document.getElementById('totalSOLHeld').value = data.stats.totalSOLHeld || 0;
                document.getElementById('totalTRONHeld').value = data.stats.totalTRONHeld || 0;
                document.getElementById('aiTradingVolume').value = data.stats.aiTradingVolume || 0;
                document.getElementById('totalTrades').value = data.stats.totalTrades || 0;
                document.getElementById('monthlyReturn').value = data.stats.monthlyReturn || 0;
                if (data.stats.historicalReserves) {
                    historicalMonths = data.stats.historicalReserves;
                    renderHistoricalMonths();
                }
            }
        }
        
        function renderHistoricalMonths() {
            const container = document.getElementById('historicalReservesContainer');
            let html = '';
            historicalMonths.forEach((month, index) => {
                html += `<div style="margin-bottom: 12px; padding: 8px; background: #2B3139; border-radius: 8px;">
                            <input type="text" id="hist_month_${index}" value="${month.month}" placeholder="Month Name" style="width: 30%; margin-right: 8px;">
                            <input type="number" id="hist_balance_${index}" value="${month.totalUserBalances}" placeholder="Total User Balances" style="width: 30%; margin-right: 8px;">
                            <input type="number" id="hist_ratio_${index}" value="${month.reserveRatio}" placeholder="Reserve Ratio %" style="width: 25%; margin-right: 8px;">
                            <button onclick="removeHistoricalMonth(${index})" style="width: auto; background:#F6465D;">Remove</button>
                        </div>`;
            });
            container.innerHTML = html;
        }
        
        function addHistoricalMonth() {
            historicalMonths.push({ month: 'New Month', totalUserBalances: 0, reserveRatio: 100 });
            renderHistoricalMonths();
        }
        
        function removeHistoricalMonth(index) {
            historicalMonths.splice(index, 1);
            renderHistoricalMonths();
        }
        
        async function updateHistoricalReserves() {
            const updated = [];
            for (let i = 0; i < historicalMonths.length; i++) {
                updated.push({
                    month: document.getElementById(`hist_month_${i}`).value,
                    totalUserBalances: parseFloat(document.getElementById(`hist_balance_${i}`).value) || 0,
                    reserveRatio: parseFloat(document.getElementById(`hist_ratio_${i}`).value) || 0
                });
            }
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch('/api/admin/update-stats', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminEmail, adminPassword, historicalReserves: updated })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('historicalMsg').innerHTML = '<div class="success">Historical reserves updated</div>';
                historicalMonths = updated;
            } else {
                document.getElementById('historicalMsg').innerHTML = `<div class="error">${data.error}</div>`;
            }
        }
        
        async function loadUsers() {
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch(`/api/admin/users?email=${adminEmail}&password=${adminPassword}`);
            const data = await res.json();
            if (data.success && data.users) {
                let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Country</th><th>Balance</th><th>AI Profit</th><th>Ref Code</th><th>Ref Count</th><th>Verified</th><th>Joined</th></tr></thead><tbody>';
                data.users.forEach(u => {
                    html += `<tr>
                        <td>${escapeHtml(u.fullName)}</td>
                        <td>${escapeHtml(u.email)}</td>
                        <td>${escapeHtml(u.country || '-')}</td>
                        <td>$${u.balance.toFixed(2)}</td>
                        <td>$${(u.aiProfit || 0).toFixed(2)}</td>
                        <td><span class="badge badge-referral">${escapeHtml(u.referralCode || '-')}</span></td>
                        <td>${u.referralCount || 0}</td>
                        <td>${u.emailVerified ? '✅' : '❌'}</td>
                        <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('usersList').innerHTML = html;
            } else {
                document.getElementById('usersList').innerHTML = '<div class="error">Failed to load users</div>';
            }
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        async function loadHistoricalReserves() {
            const adminEmail = document.getElementById('adminEmail').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const res = await fetch(`/api/admin/stats?email=${adminEmail}&password=${adminPassword}`);
            const data = await res.json();
            if (data.success && data.stats && data.stats.historicalReserves) {
                historicalMonths = data.stats.historicalReserves;
                renderHistoricalMonths();
            }
        }
    </script>
</body>
</html>
