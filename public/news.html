<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Crypto News | Coinzara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0E1A; color: #EAECEF; }
        .navbar { background: #0B0E1A; border-bottom: 1px solid #2B3139; padding: 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #F0B90B, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .nav-links a { color: #EAECEF; text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #848E9C; margin-bottom: 32px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
        .news-card { background: #1E232C; border-radius: 16px; overflow: hidden; border: 1px solid #2B3139; transition: transform 0.2s; }
        .news-card:hover { transform: translateY(-4px); }
        .news-card a { text-decoration: none; color: inherit; }
        .news-icon { width: 100%; height: 140px; background: linear-gradient(135deg, #2B3139, #1E232C); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; }
        .news-content { padding: 20px; }
        .news-source { font-size: 0.7rem; color: #F0B90B; text-transform: uppercase; margin-bottom: 8px; }
        .news-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
        .news-summary { font-size: 0.8rem; color: #848E9C; line-height: 1.5; margin-bottom: 16px; }
        .news-date { font-size: 0.7rem; color: #848E9C; }
        .loading { text-align: center; padding: 60px; color: #848E9C; }
        footer { text-align: center; padding: 24px; border-top: 1px solid #2B3139; color: #848E9C; font-size: 0.7rem; margin-top: 40px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
        .footer-links a { color: #848E9C; text-decoration: none; }
        .footer-links a:hover { color: #F0B90B; }
        @media (max-width: 768px) { .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">COINZARA</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="learn.html">Learn</a>
                <a href="news.html">News</a>
                <a href="transaction-history.html">History</a>
                <a href="settings.html">Settings</a>
                <a href="support.html">Support</a>
                <a href="proof-of-reserves.html">Proof of Reserves</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Crypto News</h1>
        <div class="subtitle">Latest updates from the cryptocurrency world</div>
        <div id="newsContainer" class="news-grid"><div class="loading">Loading latest crypto news...</div></div>
    </div>

    <footer>
        <p>&copy; 2026 Coinzara.org - AI Crypto Trading Platform</p>
        <div class="footer-links">
            <a href="terms.html">Terms & Conditions</a>
            <a href="proof-of-reserves.html">Proof of Reserves</a>
            <a href="support.html">Support</a>
        </div>
    </footer>

    <script>
        const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://www.coindesk.com/feed/';
        function getIconForTitle(title) { const t = title.toLowerCase(); if (t.includes('bitcoin') || t.includes('btc')) return '₿'; if (t.includes('ethereum') || t.includes('eth')) return '⟠'; if (t.includes('bnb') || t.includes('binance')) return 'B'; if (t.includes('solana') || t.includes('sol')) return 'S'; if (t.includes('tron') || t.includes('trx')) return 'T'; return 'C'; }
        async function fetchCryptoNews() { try { const res = await fetch(RSS_URL); const data = await res.json(); if (data.status === 'ok' && data.items) { displayNews(data.items.slice(0, 24)); } else { displayFallbackNews(); } } catch (error) { displayFallbackNews(); } }
        function displayNews(items) { const container = document.getElementById('newsContainer'); let html = ''; items.forEach(item => { let description = item.description.replace(/<[^>]*>/g, '').substring(0, 150); if (description.length >= 150) description += '...'; html += `<div class="news-card"><a href="${item.link}" target="_blank"><div class="news-icon">${getIconForTitle(item.title)}</div><div class="news-content"><div class="news-source">${item.author || 'Crypto News'}</div><div class="news-title">${escapeHtml(item.title)}</div><div class="news-summary">${escapeHtml(description)}</div><div class="news-date">${new Date(item.pubDate).toLocaleDateString()}</div></div></a></div>`; }); container.innerHTML = html; }
        function displayFallbackNews() { const fallback = [{ source: "CoinDesk", title: "Bitcoin Surges Past $70,000", summary: "BTC reaches new all-time high amid institutional demand.", date: "Today", icon: "₿" }, { source: "CoinTelegraph", title: "Ethereum Network Upgrade Complete", summary: "Gas fees reduced after successful upgrade.", date: "Today", icon: "⟠" }, { source: "CryptoSlate", title: "BNB Chain Announces New Fund", summary: "$100 million program to support DeFi developers.", date: "Yesterday", icon: "B" }, { source: "The Block", title: "Solana Hits 1 Million Daily Users", summary: "Network activity reaches all-time high.", date: "Yesterday", icon: "S" }, { source: "Decrypt", title: "Tron's USDT Supply Reaches New High", summary: "TRC-20 USDT now dominates stablecoin market.", date: "2 days ago", icon: "T" }]; const container = document.getElementById('newsContainer'); let html = ''; fallback.forEach(n => { html += `<div class="news-card"><div class="news-icon">${n.icon}</div><div class="news-content"><div class="news-source">${n.source}</div><div class="news-title">${n.title}</div><div class="news-summary">${n.summary}</div><div class="news-date">${n.date}</div></div></div>`; }); container.innerHTML = html; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        function showLogoutConfirm() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.zIndex = '10000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            const content = document.createElement('div');
            content.style.backgroundColor = '#1E232C';
            content.style.borderRadius = '16px';
            content.style.padding = '28px';
            content.style.maxWidth = '350px';
            content.style.width = '90%';
            content.style.textAlign = 'center';
            content.style.border = '1px solid #2B3139';
            content.innerHTML = `<h3 style="color:#F0B90B; margin-bottom:16px;">Confirm Logout</h3><p style="color:#EAECEF; margin-bottom:24px;">Are you sure you want to logout?</p><div style="display:flex; gap:12px; justify-content:center;"><button id="logoutCancelBtn" style="background:#2B3139; color:#EAECEF; padding:10px 24px; border:none; border-radius:8px; cursor:pointer;">Cancel</button><button id="logoutConfirmBtn" style="background:#F6465D; color:white; padding:10px 24px; border:none; border-radius:8px; cursor:pointer;">Logout</button></div>`;
            modal.appendChild(content);
            document.body.appendChild(modal);
            document.getElementById('logoutCancelBtn').addEventListener('click', () => { modal.remove(); });
            document.getElementById('logoutConfirmBtn').addEventListener('click', async () => { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'login.html'; });
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); showLogoutConfirm(); });
        fetchCryptoNews();
    </script>
</body>
</html>
