<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Transaction History | Coinzara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0E1A; color: #EAECEF; }
        .navbar { background: #0B0E1A; border-bottom: 1px solid #2B3139; padding: 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #F0B90B, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .nav-links a { color: #EAECEF; text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .subtitle { color: #848E9C; margin-bottom: 32px; }
        .transaction-table { background: #1E232C; border-radius: 16px; overflow: hidden; border: 1px solid #2B3139; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F0B90B; color: #0B0E1A; padding: 16px; text-align: left; font-weight: 600; }
        td { padding: 16px; border-bottom: 1px solid #2B3139; color: #848E9C; }
        tr:last-child td { border-bottom: none; }
        .deposit { color: #0ECB81; }
        .withdrawal { color: #F6465D; }
        .empty-state { text-align: center; padding: 60px; color: #848E9C; }
        footer { text-align: center; padding: 24px; border-top: 1px solid #2B3139; color: #848E9C; font-size: 0.7rem; margin-top: 40px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
        .footer-links a { color: #848E9C; text-decoration: none; }
        .footer-links a:hover { color: #F0B90B; }
        .back-btn { background: #2B3139; color: #EAECEF; padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
        @media (max-width: 768px) { th, td { padding: 12px 8px; font-size: 0.8rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">COINZARA</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="learn.html">Learn</a>
                <a href="news.html">News</a>
                <a href="transaction-history.html">History</a>
                <a href="settings.html">Settings</a>
                <a href="support.html">Support</a>
                <a href="proof-of-reserves.html">Proof of Reserves</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Transaction History</h1>
        <div class="subtitle">View your deposit and withdrawal records</div>
        <div class="transaction-table" id="historyContainer">
            <div class="empty-state">Loading transaction history...</div>
        </div>
        <button class="back-btn" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>

    <footer>
        <p>&copy; 2026 Coinzara.org - AI Crypto Trading Platform</p>
        <div class="footer-links">
            <a href="terms.html">Terms & Conditions</a>
            <a href="proof-of-reserves.html">Proof of Reserves</a>
            <a href="support.html">Support</a>
        </div>
    </footer>

    <script>
        async function loadTransactionHistory() {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (data.loggedIn) {
                const history = data.transactionHistory || [];
                const container = document.getElementById('historyContainer');
                if (history.length === 0) {
                    container.innerHTML = '<div class="empty-state">No transaction history yet. Make a deposit to get started.</div>';
                    return;
                }
                let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Balance After</th><th>Status</th></tr></thead><tbody>';
                history.forEach(tx => {
                    const amountClass = tx.type === 'Deposit' ? 'deposit' : 'withdrawal';
                    const amountPrefix = tx.type === 'Deposit' ? '+' : '';
                    html += `<tr>
                        <td>${new Date(tx.date).toLocaleString()}</td>
                        <td>${tx.type}</td>
                        <td class="${amountClass}">${amountPrefix}$${Math.abs(tx.amount).toFixed(2)}</td>
                        <td>$${tx.balance.toFixed(2)}</td>
                        <td>${tx.status || 'Completed'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } else {
                window.location.href = 'login.html';
            }
        }
        
        function showLogoutConfirm() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.zIndex = '10000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            const content = document.createElement('div');
            content.style.backgroundColor = '#1E232C';
            content.style.borderRadius = '16px';
            content.style.padding = '28px';
            content.style.maxWidth = '350px';
            content.style.width = '90%';
            content.style.textAlign = 'center';
            content.style.border = '1px solid #2B3139';
            content.innerHTML = `<h3 style="color:#F0B90B; margin-bottom:16px;">Confirm Logout</h3><p style="color:#EAECEF; margin-bottom:24px;">Are you sure you want to logout?</p><div style="display:flex; gap:12px; justify-content:center;"><button id="logoutCancelBtn" style="background:#2B3139; color:#EAECEF; padding:10px 24px; border:none; border-radius:8px; cursor:pointer;">Cancel</button><button id="logoutConfirmBtn" style="background:#F6465D; color:white; padding:10px 24px; border:none; border-radius:8px; cursor:pointer;">Logout</button></div>`;
            modal.appendChild(content);
            document.body.appendChild(modal);
            document.getElementById('logoutCancelBtn').addEventListener('click', () => { modal.remove(); });
            document.getElementById('logoutConfirmBtn').addEventListener('click', async () => { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'login.html'; });
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); showLogoutConfirm(); });
        loadTransactionHistory();
    </script>
</body>
</html>
